<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pickle Friends</title>
  <meta name="theme-color" content="#1a7a5c">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='20' width='80' height='60' rx='10' fill='%231a7a5c'/><line x1='50' y1='20' x2='50' y2='80' stroke='%23fff' stroke-width='3'/><line x1='10' y1='50' x2='90' y2='50' stroke='%23fff' stroke-width='3'/></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#f6f2ec"><div style="font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:700;color:#1a7a5c">Loading...</div></div></div>
<div class="pin-modal" id="pinModal"><div class="pin-box">
  <div class="pin-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
  <div class="pin-title">Admin access</div><div class="pin-sub">Enter 4-digit PIN</div>
  <div class="pin-dots"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div>
  <div class="pin-keypad"><button class="pin-key" onclick="pinPress('1')">1</button><button class="pin-key" onclick="pinPress('2')">2</button><button class="pin-key" onclick="pinPress('3')">3</button><button class="pin-key" onclick="pinPress('4')">4</button><button class="pin-key" onclick="pinPress('5')">5</button><button class="pin-key" onclick="pinPress('6')">6</button><button class="pin-key" onclick="pinPress('7')">7</button><button class="pin-key" onclick="pinPress('8')">8</button><button class="pin-key" onclick="pinPress('9')">9</button><button class="pin-key cancel" onclick="closePin()">Cancel</button><button class="pin-key" onclick="pinPress('0')">0</button><button class="pin-key del" onclick="pinDel()">&#9003;</button></div>
  <div class="pin-err" id="pinErr"></div>
</div></div>
<div class="modal-overlay" id="editModal"><div class="modal-box">
  <div class="modal-title">Edit player</div>
  <div style="margin-bottom:10px"><label class="lbl">Name</label><input id="edName" class="inp"></div>
  <div style="margin-bottom:10px"><label class="lbl">Gender</label><select id="edGender" class="inp"><option value="M">M</option><option value="F">F</option></select></div>
  <div class="btn-row"><button class="bg-btn" onclick="closeEditModal()">Cancel</button><button class="bp" onclick="saveEditPlayer()">Save</button></div>
</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="/js/app.js"></script>
</body></html>
